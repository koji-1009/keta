name: keta_rds
description: >-
  Ring 2 adapter binding keta_db to PostgreSQL over package:postgres. Owns a
  bounded reader/writer connection pool, error translation, and migrations;
  writes no wire protocol of its own.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0
  keta_db: ^0.1.0
  postgres: ^3.5.0

dev_dependencies:
  test: ^1.25.0
