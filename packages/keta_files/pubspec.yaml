name: keta_files
description: >-
  File-based routing for keta: a file's location under lib/routes/ IS its URL —
  routes/users/_id.dart serves /users/:id — and the bindings are materialized
  from the tree into a manifest's marked regions.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0
  path: ^1.9.0

dev_dependencies:
  test: ^1.25.0
