name: keta_multipart
version: 0.1.0
description: >-
  multipart/form-data reception for keta. Consumes c.bodyStream() and yields a
  Stream<Part>, delegating boundary parsing to package:mime. The core learns no
  multipart vocabulary; this is an Optional Ring 3 adapter.
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0
  mime: ^2.0.0

dev_dependencies:
  test: ^1.25.0
