name: keta_otel
description: >-
  OpenTelemetry for keta — request spans exported over a minimal OTLP/HTTP JSON
  exporter, plus a Prometheus /metrics endpoint. No dependency on an external
  OTel SDK.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0

dev_dependencies:
  test: ^1.25.0
