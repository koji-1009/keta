name: keta
description: >-
  keta (桁) — a reflection-free, codegen-free HTTP server framework for Dart.
  Ring 0 Foundation: router, Context, middleware, server, Log, and the
  in-package test-support library (package:keta/test.dart). The server
  depends on nothing beyond the SDK.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  # Backs the test-support library this package ships by design
  # (package:keta/test.dart) — imported by test code only.
  test: ^1.25.0

