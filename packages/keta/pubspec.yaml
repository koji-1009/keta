name: keta
description: >-
  keta (桁) — a reflection-free, codegen-free HTTP server framework for Dart.
  Ring 0 Foundation: router, Context, middleware, server, Log, test harness.
  Zero production dependencies — a compiled binary carries only the SDK;
  `test` resolves solely for the shipped test harness.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  # keta/test.dart ships the in-process harness (testBothModes registers cases
  # with package:test); the compiled production binary never imports it, so
  # `dart compile exe` excludes it.
  test: ^1.25.0

