name: keta_files_example
description: >-
  A standalone keta app with file-based routing (keta_files): a file's location
  under lib/routes/ IS its URL — routes/users/_id.dart serves /users/:id — and
  the manifest's marked regions are materialized from the tree by
  `dart run keta_files:sync`.
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0
  keta_db: ^0.1.0
  keta_sqlite: ^0.1.0
  keta_openapi: ^0.1.0
  keta_otel: ^0.1.0
  keta_multipart: ^0.1.0
  # A dependency, not a dev one: routeSegments runs on every request. The sync
  # tool is dev-time; what it materializes is not.
  keta_files: ^0.1.0

dev_dependencies:
  test: ^1.25.0
