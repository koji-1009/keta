name: keta_websocket_example
description: >-
  A runnable keta app demonstrating the WebSocket "upgrade as a value": an
  ordinary GET whose handler returns Response.upgrade, gated by a bearer
  SecurityPolicy so the 401 is answered before the handshake switches. Kept
  apart from examples/register because that app mounts cors() app-wide, and
  cors' response rebuild drops the Upgrade value — an upgrade cannot compose
  behind it.
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0
  keta_openapi: ^0.1.0

dev_dependencies:
  test: ^1.25.0
