name: keta_websocket_example
description: >-
  A runnable keta app demonstrating the WebSocket "upgrade as a value": an
  ordinary GET whose handler returns Response.upgrade, gated by a bearer
  SecurityPolicy so the 401 is answered before the handshake switches. A small,
  focused example kept separate from examples/register on a minimal middleware
  stack, so the upgrade-and-gate idea stands on its own.
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0
  keta_openapi: ^0.1.0

dev_dependencies:
  test: ^1.25.0
