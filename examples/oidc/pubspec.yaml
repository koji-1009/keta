name: keta_oidc_example
description: >-
  A runnable OIDC/OAuth2 resource server for keta: the real production wiring
  (HttpJwksSource.discover + BoringSslVerifier) beside the StaticJwks test
  wiring, gating a public route, a Bearer-protected /me, a
  requireScopes()-guarded route, and an SSE feed — all behind the same
  oidc() middleware.
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0
  keta_oidc: ^0.1.0
  keta_oidc_boringssl: ^0.1.0
  keta_openapi: ^0.1.0
  # testing.dart: bin/demo.dart plays the IdP for a no-network run, minting a
  # key + token via RsaKeyPair (see lib/demo.dart). A real resource server never
  # signs, so this is a demo-only use of keta_native's key-generation support —
  # but because bin/demo.dart is a runnable entrypoint, it is a real dependency,
  # not a dev one.
  keta_native: ^0.1.0

dev_dependencies:
  test: ^1.25.0
