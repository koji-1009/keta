name: keta_register_example
description: A runnable keta app — routes in both syntaxes, SQLite, OpenAPI.
publish_to: none

environment:
  sdk: ^3.12.0

resolution: workspace

dependencies:
  keta: ^0.1.0
  keta_db: ^0.1.0
  keta_sqlite: ^0.1.0
  keta_openapi: ^0.1.0
  keta_otel: ^0.1.0
  keta_multipart: ^0.1.0

dev_dependencies:
  test: ^1.25.0
  # The drift-repair loop demo (test/canonical_drift_demo_test.dart, README's
  # "When you add a field") runs keta_lints' canonicalDiagnostics/
  # applyCanonicalFix directly. Dev-time only: the checker/fixer never ships in
  # the running app. A workspace member, so path resolution is automatic.
  keta_lints: ^0.1.0
