# keta monorepo — pub workspace root.
# All keta_* packages resolve together so cross-package changes stay atomic
# and a single CI (performance budget, dependency budget, quality gates) runs
# across the whole tree (§1 "Repository layout").
name: keta_workspace
publish_to: none

environment:
  sdk: ^3.12.0

dev_dependencies:
  lints: ^6.0.0

workspace:
  # Rule: workspace-internal dependencies are declared hosted-style —
  # `^x.y.z` when the target has a version, `any` for versionless example
  # packages — never `path:` (resolution is identical inside the workspace;
  # one spelling keeps the tree canonical).
  - packages/keta
  - packages/keta_db
  - packages/keta_sqlite
  - packages/keta_openapi
  - packages/keta_lints
  - packages/keta_files
  - packages/keta_static
  - packages/keta_otel
  - packages/keta_multipart
  - packages/keta_rds
  - packages/keta_bus
  - packages/keta_native
  - packages/keta_oidc
  - packages/keta_oidc_boringssl
  - examples/register
  - examples/files
  - examples/auth
  - examples/websocket
  - examples/oidc
