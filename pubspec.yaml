# keta monorepo — pub workspace root.
# All keta_* packages resolve together so cross-package changes stay atomic
# and a single CI (performance budget, dependency budget, quality gates) runs
# across the whole tree (§1 "Repository layout").
name: keta_workspace
publish_to: none

environment:
  sdk: ^3.12.0

dev_dependencies:
  lints: ^6.0.0

workspace:
  - packages/keta
  - packages/keta_db
  - packages/keta_sqlite
  - packages/keta_openapi
  - packages/keta_lints
  - packages/keta_shelf
  - packages/keta_files
  - packages/keta_otel
  - packages/keta_multipart
  - packages/keta_rds
  - examples/register
  - examples/files
  - examples/auth
  - examples/websocket
