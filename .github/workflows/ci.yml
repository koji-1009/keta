name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Space-padded: `contains` is a substring test, so an unpadded list matches
  # every prefix too, `packages/keta` included.
  BORINGSSL_DIRS: " packages/keta_native packages/keta_oidc packages/keta_oidc_boringssl examples/oidc "
  SQLITE_DIRS: " packages/keta_sqlite examples/register examples/files "

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          # Stable is what users install; if a new stable's formatter reformats, the format gate fails loudly and a one-off reformat commit fixes it.
          sdk: stable
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          # One pub workspace = one resolve, so every job shares this key.
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      # keta_files' own CI gate: fails when examples/files' lib/routes/ tree
      # and its generated manifest (lib/routes.dart) disagree, e.g. a route
      # file added but never synced — see packages/keta_files/README.md.
      - name: keta_files:check (examples/files)
        run: (cd examples/files && dart run keta_files:check)
      # A new package or example with a test/ dir must join the test matrix
      # below; this diff makes forgetting it a red run, not a silent skip.
      - name: Test matrix covers every test/ dir
        run: |
          diff <(for d in packages/*/ examples/*/; do [ -d "${d}test" ] && echo "${d%/}"; done | sort) \
               <(awk '$1 == "-" && $2 ~ /^(packages|examples)\//{ print $2 }' .github/workflows/ci.yml | sort)

  test:
    strategy:
      fail-fast: false
      matrix:
        # Coverage of this list is enforced by the checks job's diff gate.
        dir:
          - packages/keta
          - packages/keta_bus
          - packages/keta_db
          - packages/keta_files
          - packages/keta_lints
          - packages/keta_multipart
          - packages/keta_native
          - packages/keta_oidc
          - packages/keta_oidc_boringssl
          - packages/keta_openapi
          - packages/keta_otel
          - packages/keta_rds
          - packages/keta_sqlite
          - packages/keta_static
          - examples/auth
          - examples/files
          - examples/oidc
          - examples/register
          - examples/websocket
    # keta_rds starts a Postgres container, which ubuntu-slim cannot host
    # (unprivileged, no nested containers); keta_lints and the BoringSSL
    # consumers are CPU-bound, and ubuntu-slim is 1 vCPU with a hard
    # 15-minute job cap.
    # Padded like BORINGSSL_DIRS; the env context is unavailable here, so the
    # list is inline.
    runs-on: ${{ contains(' packages/keta_rds packages/keta_lints packages/keta_native packages/keta_oidc packages/keta_oidc_boringssl examples/oidc ', format(' {0} ', matrix.dir)) && 'ubuntu-latest' || 'ubuntu-slim' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      # package:sqlite3 loads the system libsqlite3.
      - if: ${{ contains(env.SQLITE_DIRS, format(' {0} ', matrix.dir)) }}
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-
      - if: ${{ contains(env.BORINGSSL_DIRS, format(' {0} ', matrix.dir)) }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .dart_tool/hooks_runner/shared/keta_native/build/boringssl-checkout
          key: boringssl-src-${{ runner.os }}-${{ hashFiles('packages/keta_native/hook/boringssl_commit.txt') }}
      - if: ${{ contains(env.BORINGSSL_DIRS, format(' {0} ', matrix.dir)) }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            .dart_tool/hooks_runner/keta_native
            .dart_tool/hooks_runner/shared/keta_native/build
            !.dart_tool/hooks_runner/shared/keta_native/build/boringssl-checkout
          key: boringssl-obj-${{ runner.os }}-${{ hashFiles('packages/keta_native/hook/**') }}
      - run: dart pub get
      # keta_rds's contract suite runs only when KETA_TEST_PG is set (it skips
      # visibly otherwise), so the container and the variable exist only on
      # this entry. sslmode=disable: the stock postgres:16 image ships with
      # SSL off, and package:postgres attempts SSL by default.
      - name: Start Postgres
        if: matrix.dir == 'packages/keta_rds'
        run: |
          docker run -d --name pg -e POSTGRES_PASSWORD=postgres -p 5432:5432 postgres:16
          for _ in $(seq 1 30); do
            if docker exec pg pg_isready -h localhost -U postgres; then ready=1; break; fi
            sleep 1
          done
          [ "${ready:-0}" = 1 ]
          echo "KETA_TEST_PG=postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable" >> "$GITHUB_ENV"
      - name: Test ${{ matrix.dir }}
        run: cd '${{ matrix.dir }}' && dart test
