name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    services:
      # Lets keta_rds run its real contract suite instead of skipping it.
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # package:postgres defaults to attempting SSL; the stock postgres:16
      # service container has it off, so connecting would fail without this.
      KETA_TEST_PG: postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: stable
      # package:sqlite3 loads the system libsqlite3.
      - run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev
      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
      - run: dart analyze --fatal-infos
      # keta_files' own CI gate: fails when examples/files' lib/routes/ tree
      # and its generated manifest (lib/routes.dart) disagree, e.g. a route
      # file added but never synced — see packages/keta_files/README.md.
      - name: keta_files:check (examples/files)
        run: (cd examples/files && dart run keta_files:check)
      - name: Test every package and example
        run: |
          for d in packages/*/ examples/*/; do
            if [ -d "$d/test" ]; then
              echo "=== $d"
              (cd "$d" && dart test)
            fi
          done
